<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #0d1b2a;
  }

  body {
    font-family: 'Cormorant Garamond', Georgia, serif;
    position: relative;
  }

  /* ── Background texture lines ── */
  .bg-lines {
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(
        90deg,
        transparent,
        transparent 119px,
        rgba(255,255,255,0.028) 119px,
        rgba(255,255,255,0.028) 120px
      ),
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 89px,
        rgba(255,255,255,0.02) 89px,
        rgba(255,255,255,0.02) 90px
      );
  }

  /* ── Large faint circle behind logo ── */
  .circle-lg {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 780px;
    height: 780px;
    border: 1px solid rgba(255,255,255,0.045);
    border-radius: 50%;
  }
  .circle-sm {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 520px;
    height: 520px;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 50%;
  }

  /* ── Corner accents ── */
  .corner {
    position: absolute;
    width: 48px;
    height: 48px;
  }
  .corner-tl { top: 36px; left: 36px; border-top: 1px solid rgba(255,255,255,0.2); border-left: 1px solid rgba(255,255,255,0.2); }
  .corner-tr { top: 36px; right: 36px; border-top: 1px solid rgba(255,255,255,0.2); border-right: 1px solid rgba(255,255,255,0.2); }
  .corner-bl { bottom: 36px; left: 36px; border-bottom: 1px solid rgba(255,255,255,0.2); border-left: 1px solid rgba(255,255,255,0.2); }
  .corner-br { bottom: 36px; right: 36px; border-bottom: 1px solid rgba(255,255,255,0.2); border-right: 1px solid rgba(255,255,255,0.2); }

  /* ── Main content ── */
  .content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    text-align: center;
  }

  /* House SVG icon */
  .icon {
    width: 64px;
    height: 56px;
    margin-bottom: 28px;
    opacity: 0.9;
  }

  /* Eyebrow */
  .eyebrow {
    font-size: 0.78rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: rgba(240,237,232,0.45);
    margin-bottom: 20px;
  }

  /* Brand name */
  .brand {
    font-size: 5.2rem;
    font-weight: 300;
    letter-spacing: 0.16em;
    color: #f0ede8;
    line-height: 1;
    margin-bottom: 20px;
  }

  /* Divider rule */
  .rule {
    width: 64px;
    height: 1px;
    background: rgba(240,237,232,0.25);
    margin: 0 auto 22px;
  }

  /* Tagline */
  .tagline {
    font-size: 1.4rem;
    font-weight: 300;
    font-style: italic;
    color: rgba(240,237,232,0.65);
    letter-spacing: 0.04em;
    margin-bottom: 36px;
  }

  /* Country pills row */
  .pills {
    display: flex;
    gap: 10px;
    align-items: center;
    justify-content: center;
  }
  .pill {
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    color: rgba(240,237,232,0.45);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 6px 14px;
    border-radius: 2px;
  }

  /* Bottom URL bar */
  .url-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 52px;
    background: rgba(255,255,255,0.04);
    border-top: 1px solid rgba(255,255,255,0.07);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .url-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #25d366;
  }
  .url-text {
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(240,237,232,0.3);
  }
</style>
</head>
<body>

<div class="bg-lines"></div>
<div class="circle-lg"></div>
<div class="circle-sm"></div>

<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<div class="content">
  <svg class="icon" viewBox="0 0 60 52" fill="none" xmlns="http://www.w3.org/2000/svg">
    <polyline points="2,28 30,4 58,28" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <line x1="18" y1="28" x2="18" y2="50" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <line x1="30" y1="18" x2="30" y2="50" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <line x1="42" y1="28" x2="42" y2="50" stroke="white" stroke-width="3" stroke-linecap="round"/>
  </svg>

  <div class="eyebrow">UK Guarantor Service</div>
  <div class="brand">We Link</div>
  <div class="rule"></div>
  <div class="tagline">Connecting GCC students with trusted UK guarantors &amp; verified apartments.</div>

  <div class="pills">
    <span class="pill">🇰🇼 Kuwait</span>
    <span class="pill">🇸🇦 Saudi Arabia</span>
    <span class="pill">🇦🇪 UAE</span>
    <span class="pill">🇶🇦 Qatar</span>
    <span class="pill">🇧🇭 Bahrain</span>
    <span class="pill">🇴🇲 Oman</span>
  </div>
</div>

<div class="url-bar">
  <div class="url-dot"></div>
  <div class="url-text">welink-uk.com</div>
</div>

</body>
</html>
